  d.getElementById('lblApps').textContent=t('lblApps');
  d.getElementById('lblSize').textContent=t('lblSize');
  d.getElementById('lblCats').textContent=t('lblCats');
  d.getElementById('lblDl').textContent=t('lblDl');
  d.getElementById('updLbl').textContent=t('updLbl');
  d.getElementById('searchInput').placeholder=t('search');
  d.getElementById('noResults').textContent=t('noRes');
  d.getElementById('toast').textContent=t('toast');
  d.getElementById('langBtn').textContent=lang==='ku'?'EN':'KU';
  buildFeatured();
  buildCats();
  renderApps(filter());
}

// Theme
document.getElementById('themeBtn').onclick=()=>{
  const h=document.documentElement;
  if(h.getAttribute('data-theme')==='dark'){h.setAttribute('data-theme','light');document.getElementById('themeBtn').textContent='☀️';}
  else{h.setAttribute('data-theme','dark');document.getElementById('themeBtn').textContent='🌙';}
};

// Lang
document.getElementById('langBtn').onclick=()=>{lang=lang==='ku'?'en':'ku';applyLang();};

// Stats
document.getElementById('totalApps').textContent=apps.length;
document.getElementById('totalSize').textContent=Math.round(apps.reduce((s,a)=>s+a.size,0));
document.getElementById('totalCats').textContent=cats.length;
document.getElementById('totalDl').textContent=(apps.reduce((s,a)=>s+a.downloads,0)/1000).toFixed(1)+'K';

setTimeout(()=>{const w=document.getElementById('welcome');w.classList.add('show');setTimeout(()=>w.classList.remove('show'),3500);},500);

function buildFeatured(){
  const f=apps.reduce((a,b)=>a.downloads>b.downloads?a:b);
  document.getElementById('featuredSection').innerHTML=`<div class="featured-label">${t('featLabel')}</div><div class="featured-card" onclick="openModal(apps[${apps.indexOf(f)}])"><div class="featured-badge">${t('featBadge')}</div><img class="featured-img" src="${f.img}"/><div style="flex:1"><div class="featured-name">${f.name}</div><div class="featured-meta">v${f.version} · ${f.size} MB</div><div class="dl-count">⬇️ ${f.downloads.toLocaleString()}</div></div><div class="featured-dl">${t('dl')}</div></div>`;
}

function buildCats(){
  const bar=document.getElementById('catsBar');
  bar.innerHTML='';
  [{key:'ALL',label:t('all')},...cats.map(c=>({key:c,label:c}))].forEach(({key,label})=>{
    const btn=document.createElement('button');
    btn.className='cat-btn'+(activeCat===key?' active':'');
    btn.textContent=label;
    btn.onclick=()=>{activeCat=key;document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderApps(filter());};
    bar.appendChild(btn);
  });
}

function normalize(s){return s.toLowerCase().replace(/ی/g,'ي').replace(/ک/g,'ك').replace(/ڤ/g,'ف').replace(/ۆ/g,'و').replace(/ێ/g,'ي').replace(/ە/g,'ه').replace(/\s+/g,' ').trim();}
function matchesSearch(app,q){const nq=normalize(q);if(normalize(app.name).includes(nq))return true;return app.keywords.some(k=>normalize(k).includes(nq)||nq.includes(normalize(k)));}
function filter(){return apps.filter(a=>(activeCat==='ALL'||a.cat===activeCat)&&(!activeSearch||matchesSearch(a,activeSearch)));}

function getAvg(name){const r=ratings[name];if(!r||!r.votes)return null;return(r.total/r.votes).toFixed(1);}
function starsHtml(avg,size='1rem'){let s='';for(let i=1;i<=5;i++)s+=`<span style="color:${i<=Math.round(avg)?'#FFD700':'#555'};font-size:${size}">★</span>`;return s;}

function openModal(app){
  currentApp=app;
  document.getElementById('modalImg').src=app.img;
  document.getElementById('modalName').textContent=app.name;
  document.getElementById('modalMeta').textContent=`v${app.version} · ${app.size} MB · ${app.cat}`;
  document.getElementById('modalDlBtn').textContent=t('dl');
  document.getElementById('modalDlBtn').onclick=()=>{window.location.href=app.url;const toast=document.getElementById('toast');toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2500);};
  document.getElementById('ratingTitle').textContent=t('ratingTitle');
  document.getElementById('commentsLabel').textContent=t('commentsLabel');
  document.getElementById('commentInput').placeholder=t('commentPh');
  document.getElementById('commentSend').textContent=t('send');
  updateStarsUI(app.name);
  renderComments(app.name);
  document.getElementById('modalOverlay').classList.add('show');
}

function updateStarsUI(name){
  const avg=getAvg(name);
  const rounded=avg?Math.round(parseFloat(avg)):0;
  document.querySelectorAll('.star').forEach(s=>{s.classList.toggle('active',parseInt(s.dataset.v)<=rounded);});
  document.getElementById('ratingAvg').innerHTML=avg?`${starsHtml(avg,'1rem')} ${avg} ${t('outOf')} · ${ratings[name].votes} ${t('ratedMsg')}`:'';
}

document.querySelectorAll('.star').forEach(s=>{
  s.onclick=()=>{
    if(!currentApp)return;
    const v=parseInt(s.dataset.v);
    if(!ratings[currentApp.name])ratings[currentApp.name]={total:0,votes:0};
    ratings[currentApp.name].total+=v;
    ratings[currentApp.name].votes++;
    updateStarsUI(currentApp.name);
    renderApps(filter());
  };
  s.onmouseenter=()=>{const v=parseInt(s.dataset.v);document.querySelectorAll('.star').forEach(x=>x.classList.toggle('active',parseInt(x.dataset.v)<=v));};
  s.onmouseleave=()=>{if(currentApp)updateStarsUI(currentApp.name);};
});

document.getElementById('modalClose').onclick=()=>document.getElementById('modalOverlay').classList.remove('show');
document.getElementById('modalOverlay').onclick=e=>{if(e.target===document.getElementById('modalOverlay'))document.getElementById('modalOverlay').classList.remove('show');};

function renderComments(name){
  const list=document.getElementById('commentsList');
  const c=comments[name]||[];
  list.innerHTML=c.length?c.map(x=>`<div class="comment-item">${x.text}<div class="comment-time">${x.time}</div></div>`).join(''):`<div style="color:var(--muted);font-size:0.8rem;text-align:center;padding:10px">${t('noComment')}</div>`;
}

document.getElementById('commentSend').onclick=()=>{
  const input=document.getElementById('commentInput');
  const text=input.value.trim();
  if(!text||!currentApp)return;
  if(!comments[currentApp.name])comments[currentApp.name]=[];
  const now=new Date();
  comments[currentApp.name].unshift({text,time:`${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`});
  input.value='';
  renderComments(currentApp.name);
};

function renderApps(list){
  const grid=document.getElementById('appsGrid');
  const noRes=document.getElementById('noResults');
  const lbl=document.getElementById('sectionLabel');
  grid.innerHTML='';
  lbl.textContent=`${t('apps')} (${list.length})`;
  if(!list.length){noRes.style.display='block';return;}
  noRes.style.display='none';
  list.forEach(app=>{
    const avg=getAvg(app.name);
    const card=document.createElement('div');
    card.className='app-card';
    card.innerHTML=`<img class="app-img" src="${app.img}"/><div class="app-name">${app.name}</div><div class="app-meta">v${app.version} · ${app.size}MB</div><div class="app-cat-tag">${app.cat}</div><div class="app-stars-disp">${avg?starsHtml(avg,'0.8rem')+' '+avg:'☆☆☆☆☆'}</div><div class="dl-count">⬇️ ${app.downloads.toLocaleString()}</div><div class="dl-btn">${t('dl')}</div>`;
    card.addEventListener('click',()=>openModal(app));
    grid.appendChild(card);
  });
}

document.getElementById('searchInput').addEventListener('input',e=>{activeSearch=e.target.value.trim();renderApps(filter());});
const scrollBtn=document.getElementById('scrollTop');
window.addEventListener('scroll',()=>{scrollBtn.classList.toggle('show',window.scrollY>300);});
scrollBtn.onclick=()=>window.scrollTo({top:0,behavior:'smooth'});

applyLang();
</script>
</body>
</html>
