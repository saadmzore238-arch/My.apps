<!DOCTYPE html>
<html lang="ku">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Yakuza Store 🎮</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#070711;--card:#0f0f1e;--border:rgba(255,255,255,0.07);--accent:#6C63FF;--accent2:#A78BFA;--text:#f0eeff;--muted:#7c7a9a;--green:#22d3a5}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;direction:rtl}
nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:16px 28px;background:rgba(7,7,17,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.logo{font-size:1.2rem;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-links{display:flex;gap:12px;align-items:center}
.nav-social{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:99px;border:1px solid var(--border);color:var(--text);text-decoration:none;font-size:0.75rem;font-weight:600;transition:all .2s}
.nav-social:hover{border-color:rgba(108,99,255,0.5);background:rgba(108,99,255,0.1)}
.nav-tag{font-size:0.7rem;padding:3px 10px;border-radius:99px;background:rgba(108,99,255,0.12);border:1px solid rgba(108,99,255,0.25);color:var(--accent2)}
.hero{text-align:center;padding:80px 20px 48px}
.hero h1{font-size:clamp(2.2rem,6vw,4.5rem);font-weight:900;line-height:1.2;margin-bottom:14px}
.hero h1 em{font-style:normal;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{font-size:1rem;color:var(--muted);max-width:420px;margin:0 auto;line-height:1.8}
.hero-socials{display:flex;gap:12px;justify-content:center;margin-top:24px}
.hero-social-btn{display:flex;align-items:center;gap:8px;padding:10px 20px;border-radius:99px;border:1px solid var(--border);background:var(--card);color:var(--text);text-decoration:none;font-size:0.85rem;font-weight:700;transition:all .2s}
.hero-social-btn:hover{transform:translateY(-2px);border-color:rgba(108,99,255,0.5)}
.hero-social-btn.tg{border-color:rgba(41,182,246,0.3);color:#29b6f6}
.hero-social-btn.yt{border-color:rgba(255,70,70,0.3);color:#ff4646}
.stats{display:flex;justify-content:center;gap:32px;padding:0 20px 40px}
.stat{text-align:center}
.stat-num{font-size:1.8rem;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-label{font-size:0.72rem;color:var(--muted);margin-top:2px}
.search-wrapper{max-width:720px;margin:0 auto;padding:0 20px 24px}
.search-box{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px 18px;transition:border-color .2s}
.search-box:focus-within{border-color:rgba(108,99,255,0.5)}
.search-icon{font-size:1rem;color:var(--muted);flex-shrink:0}
.search-input{background:none;border:none;outline:none;color:var(--text);font-size:0.95rem;font-family:'Inter',sans-serif;width:100%;direction:rtl}
.search-input::placeholder{color:var(--muted)}
.cats{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;padding:0 20px 24px;max-width:720px;margin:0 auto}
.cat-btn{padding:6px 16px;border-radius:99px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:0.78rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif}
.cat-btn.active,.cat-btn:hover{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-color:transparent}
.apps-section{max-width:720px;margin:0 auto;padding:0 20px 80px}
.section-label{font-size:0.7rem;font-weight:700;color:var(--muted);margin-bottom:16px}
.apps-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.app-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:20px;display:flex;align-items:center;gap:16px;text-decoration:none;color:inherit;transition:all .2s;direction:rtl}
.app-card:hover{border-color:rgba(108,99,255,0.4);transform:translateY(-2px)}
.app-img{width:58px;height:58px;border-radius:14px;flex-shrink:0;object-fit:cover}
.app-name{font-size:0.98rem;font-weight:700;margin-bottom:3px}
.app-meta{font-size:0.75rem;color:var(--muted)}
.app-cat-tag{display:inline-block;font-size:0.65rem;padding:2px 8px;border-radius:99px;background:rgba(108,99,255,0.12);color:var(--accent2);margin-top:4px}
.dl-btn{padding:7px 14px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:99px;font-size:0.78rem;font-weight:700;color:#fff;white-space:nowrap;flex-shrink:0}
.no-results{text-align:center;color:var(--muted);padding:40px 0;font-size:0.9rem;display:none}
.scroll-top{position:fixed;bottom:28px;right:20px;width:44px;height:44px;border-radius:99px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff;font-size:1.2rem;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:99;box-shadow:0 4px 16px rgba(108,99,255,0.4)}
.scroll-top.show{display:flex}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--green);color:#000;font-weight:700;font-size:0.85rem;padding:12px 24px;border-radius:99px;transition:transform .3s cubic-bezier(.34,1.56,.64,1);z-index:999;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
footer{text-align:center;padding:32px 20px;border-top:1px solid var(--border);font-size:0.75rem;color:var(--muted)}
.footer-socials{display:flex;gap:12px;justify-content:center;margin-bottom:16px}
.footer-social{display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:99px;border:1px solid var(--border);text-decoration:none;font-size:0.8rem;font-weight:700;transition:all .2s}
.footer-social:hover{transform:translateY(-2px)}
.footer-social.tg{color:#29b6f6;border-color:rgba(41,182,246,0.3)}
.footer-social.yt{color:#ff4646;border-color:rgba(255,70,70,0.3)}
</style>
</head>
<body>
<nav>
<div class="logo">Yakuza Store 🎮</div>
<div class="nav-links">
  <a class="nav-social tg" href="https://t.me/YAKUZA_CEO3" target="_blank">✈️ تەلەگرام</a>
  <a class="nav-social yt" href="https://www.youtube.com/@YAKUZA_CEO" target="_blank">▶️ یوتیوب</a>
</div>
</nav>

<section class="hero">
<h1>فرۆشگای<br><em>یاکوزا.</em></h1>
<p>هەر ئەپێک کلیک بکە بۆ داونلۆد کردنی ڕاستەوخۆ بۆ مۆبایلەکەت.</p>
<div class="hero-socials">
  <a class="hero-social-btn tg" href="https://t.me/YAKUZA_CEO3" target="_blank">✈️ کەناڵی تەلەگرام</a>
  <a class="hero-social-btn yt" href="https://www.youtube.com/@YAKUZA_CEO" target="_blank">▶️ کەناڵی یوتیوب</a>
</div>
</section>

<div class="stats">
<div class="stat"><div class="stat-num" id="totalApps">0</div><div class="stat-label">کۆی ئەپەکان</div></div>
<div class="stat"><div class="stat-num" id="totalSize">0</div><div class="stat-label">MB کۆی قەبارە</div></div>
<div class="stat"><div class="stat-num" id="totalCats">0</div><div class="stat-label">کاتیگۆری</div></div>
</div>

<div class="search-wrapper">
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="searchInput" type="text" placeholder="گەڕان بۆ ئەپەکان..." />
  </div>
</div>

<div class="cats" id="catsBar"></div>

<section class="apps-section">
<div class="section-label" id="sectionLabel">ئەپەکان</div>
<div class="apps-grid" id="appsGrid"></div>
<div class="no-results" id="noResults">❌ هیچ ئەپێک نەدۆزرایەوە</div>
</section>

<button class="scroll-top" id="scrollTop">↑</button>
<div class="toast" id="toast">✓ داونلۆد دەستپێکرد!</div>

<footer>
  <div class="footer-socials">
    <a class="footer-social tg" href="https://t.me/YAKUZA_CEO3" target="_blank">✈️ تەلەگرام</a>
    <a class="footer-social yt" href="https://www.youtube.com/@YAKUZA_CEO" target="_blank">▶️ یوتیوب</a>
  </div>
  Yakuza Store 🎮 · ئەپی مۆدکراو
</footer>

<script>
const apps=[
  {name:"یاکوزا نێتفلیکس",keywords:["netflix","نێتفلیکس","netfliks","فلیکس"],cat:"ڤیدیۆ",img:"https://i.imgur.com/7RfYVsb.png",version:"1.0",size:38.45,url:"https://github.com/saadmzore238-arch/My.apps/releases/download/v1.0/Netflix-IPAOMTK.COM.ipa"},
  {name:"یاکوزا 8 بۆل پوول",keywords:["8ball","8 ball","بۆل","پوول","pool","بیلیارد"],cat:"یاری",img:"https://i.imgur.com/vVz5h64.png",version:"1.0",size:99.8,url:"https://github.com/saadmzore238-arch/My.apps/releases/download/v1.0/YAKUZA8Bp.ipa"},
  {name:"یاکوزا ڤیدیۆ ستار",keywords:["video","ڤیدیۆ","ستار","star","videostar"],cat:"ڤیدیۆ",img:"https://i.imgur.com/QXaLmlJ.png",version:"1.0",size:400,url:"https://drive.google.com/uc?export=download&id=1tjZ8Aeh17WFKJfEMnV0Qt1u39JgEpe7R"}
];
const cats=[...new Set(apps.map(a=>a.cat))];
let activeCat='هەموو';
let activeSearch='';
document.getElementById('totalApps').textContent=apps.length;
document.getElementById('totalSize').textContent=Math.round(apps.reduce((s,a)=>s+a.size,0));
document.getElementById('totalCats').textContent=cats.length;
const catsBar=document.getElementById('catsBar');
['هەموو',...cats].forEach(c=>{
  const btn=document.createElement('button');
  btn.className='cat-btn'+(c==='هەموو'?' active':'');
  btn.textContent=c;
  btn.onclick=()=>{activeCat=c;document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderApps(filter());};
  catsBar.appendChild(btn);
});
function normalize(str){return str.toLowerCase().replace(/ی/g,'ي').replace(/ک/g,'ك').replace(/ڤ/g,'ف').replace(/ۆ/g,'و').replace(/ێ/g,'ي').replace(/ە/g,'ه').replace(/\s+/g,' ').trim();}
function matchesSearch(app,q){const nq=normalize(q);if(normalize(app.name).includes(nq))return true;if(app.keywords.some(k=>normalize(k).includes(nq)||nq.includes(normalize(k))))return true;return false;}
function filter(){return apps.filter(a=>{const catOk=activeCat==='هەموو'||a.cat===activeCat;const searchOk=!activeSearch||matchesSearch(a,activeSearch);return catOk&&searchOk;});}
const grid=document.getElementById('appsGrid');
const noResults=document.getElementById('noResults');
const sectionLabel=document.getElementById('sectionLabel');
function renderApps(list){
  grid.innerHTML='';
  sectionLabel.textContent=`ئەپەکان (${list.length})`;
  if(list.length===0){noResults.style.display='block';return;}
  noResults.style.display='none';
  list.forEach(app=>{
    const card=document.createElement('a');
    card.className='app-card';
    card.href=app.url;
    card.innerHTML=`<img class="app-img" src="${app.img}"/><div style="flex:1"><div class="app-name">${app.name}</div><div class="app-meta">v${app.version} · ${app.size} MB</div><div class="app-cat-tag">${app.cat}</div></div><div class="dl-btn">↓ داونلۆد</div>`;
    card.addEventListener('click',()=>{const t=document.getElementById('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)});
    grid.appendChild(card);
  });
}
document.getElementById('searchInput').addEventListener('input',e=>{activeSearch=e.target.value.trim();renderApps(filter());});
const scrollBtn=document.getElementById('scrollTop');
window.addEventListener('scroll',()=>{scrollBtn.classList.toggle('show',window.scrollY>300);});
scrollBtn.onclick=()=>window.scrollTo({top:0,behavior:'smooth'});
renderApps(filter());
</script>
</body>
</html>
